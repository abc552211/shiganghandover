<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仕罡印刷-獨立工作交接看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { color: #3A4449; background-color: #F0F1F0; -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F0F1F0; }
        ::-webkit-scrollbar-thumb { background: #8D9B9F; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-[100dvh] flex flex-col items-center">

    <div class="w-full max-w-2xl bg-white border border-gray-300 rounded-xl shadow-md p-4 md:p-6">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-5 border-b pb-4">
            <div>
                <h1 class="text-xl font-bold text-gray-800 border-l-4 border-slate-600 pl-2 tracking-wider">仕罡印刷事業 - 工作交接看板</h1>
                <p class="text-xs text-gray-400 mt-1">交接務秘確實完整，避免遺漏造成後續作業中斷。</p>
            </div>
            <button onclick="openHandoverModal()" class="w-full sm:w-auto bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow transition-all">
                ＋ 新增發布交接
            </button>
        </div>

        <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center gap-1.5">
                <button onclick="filterPriority('all')" class="px-2.5 py-1 bg-slate-600 text-white text-xs font-bold rounded shadow-sm hover:bg-slate-700 transition">全部</button>
                <button onclick="filterPriority('高')" class="px-2.5 py-1 bg-red-100 text-red-700 border border-red-200 text-xs font-bold rounded shadow-sm hover:bg-red-200 transition">🔴 高</button>
                <button onclick="filterPriority('中')" class="px-2.5 py-1 bg-yellow-100 text-yellow-800 border border-yellow-200 text-xs font-bold rounded shadow-sm hover:bg-yellow-200 transition">🟡 中</button>
                <button onclick="filterPriority('低')" class="px-2.5 py-1 bg-green-100 text-green-700 border border-green-200 text-xs font-bold rounded shadow-sm hover:bg-green-200 transition">🟢 低</button>
            </div>
            <button onclick="toggleDateSort()" id="sortBtn" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 border text-gray-700 text-xs font-bold rounded shadow-sm transition">
                ⏳ 日期排序 (新➔舊)
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="searchInput" onkeyup="filterHandovers()" placeholder="輸入關鍵字篩選交接事項..." class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-slate-500">
        </div>

        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-12">
            <div class="w-10 h-10 border-4 border-gray-200 border-t-slate-600 rounded-full animate-spin mb-3"></div>
            <span class="text-xs font-bold tracking-widest text-gray-400">資料同步中...</span>
        </div>

        <div id="handoverList" class="space-y-3 hidden"></div>
    </div>

    <div id="handoverModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md border shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                <h3 class="font-bold text-gray-800 tracking-wider">✍️ 新增工作交接</h3>
                <button onclick="closeModal('handoverModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4 overflow-y-auto text-xs">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">優先級別</label>
                        <select id="hoPriority" class="w-full p-2.5 border rounded-lg text-sm bg-white">
                            <option value="高">高 (紅色警示)</option>
                            <option value="中" selected>中 (黃色提醒)</option>
                            <option value="低">低 (綠色常態)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">交接發布人</label>
                        <select id="hoCreator" class="w-full p-2.5 border rounded-lg text-sm bg-white"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">指定接收人 (自動連動 LINE 專向推播)</label>
                    <select id="hoAssignee" class="w-full p-2.5 border rounded-lg text-sm bg-white"></select>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">交接具體內容</label>
                    <textarea id="hoContent" rows="4" placeholder="請詳細敘述交接交代事項..." class="w-full p-2.5 border rounded-lg text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">現場附加照片</label>
                    <input type="file" id="hoImage" accept="image/*" onchange="handleImageUpload(this)" class="w-full text-xs text-gray-500 cursor-pointer">
                    <div class="mt-2 flex justify-center bg-gray-50 rounded-lg border border-dashed p-1">
                        <img id="hoImagePreview" class="hidden max-h-32 object-contain p-1 rounded-lg" src="">
                    </div>
                </div>
            </div>
            <div class="p-4 border-t flex justify-end gap-3 bg-gray-50 rounded-b-xl">
                <button onclick="closeModal('handoverModal')" class="px-4 py-2 border hover:bg-gray-100 rounded-lg text-sm">取消</button>
                <button id="submitBtn" onclick="submitHandover(this)" class="px-5 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-lg text-sm font-bold shadow">發布並 LINE 推播</button>
            </div>
        </div>
    </div>

    <div id="viewImageModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex items-center justify-center p-4" onclick="closeModal('viewImageModal')">
        <div class="relative max-w-4xl max-h-[90vh] bg-white p-1 rounded-xl shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('viewImageModal')" class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold shadow-md z-10">&times;</button>
            <img id="largeImageTarget" class="max-w-full max-h-[85vh] object-contain rounded-lg" src="">
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tfgtvtceiozvnujiiiqj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK";
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const GAS_LINE_API = "https://script.google.com/macros/s/AKfycbwBImtScXqfsZ5q-ik5cqjgGvAGq3yNecD3_QvKBOw70OSoIsETlSuYWYi1aiDoeHhG/exec"; 

        let hoImageBase64 = ""; 
        let currentHandovers = [];
        let userListCache = [];
        let currentSortOrder = 'desc'; 

        window.onload = async () => {
            await fetchUsersAndBuildDropdown();
            loadMainData();
        };

        async function fetchUsersFromSupabase() {
            let { data, error } = await sbClient.from('users_auth').select('emp_name, is_visible');
            if (error) return [];
            return (data || []).filter(u => u.is_visible !== '否').map(u => u.emp_name);
        }

        async function fetchHandoversFromSupabase() {
             let { data, error } = await sbClient.from('handovers').select('*').order('created_at', { ascending: (currentSortOrder === 'asc') });
             if (error) return [];
             return data || [];
        }

        async function loadMainData() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('handoverList').classList.add('hidden');
            currentHandovers = await fetchHandoversFromSupabase();
            renderHandovers(currentHandovers);
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('handoverList').classList.remove('hidden');
        }

        async function fetchUsersAndBuildDropdown() {
            userListCache = await fetchUsersFromSupabase();
            let creatorOpts = '<option value="">請選擇您的姓名...</option>';
            let assigneeOpts = '<option value="全員">全員 (群體廣播)</option>';
            userListCache.forEach(name => {
                creatorOpts += `<option value="${name}">${name}</option>`;
                assigneeOpts += `<option value="${name}">${name}</option>`;
            });
            document.getElementById('hoCreator').innerHTML = creatorOpts;
            document.getElementById('hoAssignee').innerHTML = assigneeOpts;
        }

        function renderHandovers(list) {
            const container = document.getElementById('handoverList');
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-12 bg-gray-50 border border-dashed rounded-xl">目前沒有待辦交接事項</p>`;
                return;
            }
            list.forEach(ho => {
                let bg = 'bg-white border-gray-200'; let badge = 'bg-green-500';
                if(ho.priority === '高') { bg = 'bg-red-50/50 border-red-200'; badge = 'bg-red-500'; }
                else if(ho.priority === '中') { bg = 'bg-yellow-50/50 border-yellow-200'; badge = 'bg-yellow-500'; }

                let imgHtml = ho.image_url ? `
                    <div class="flex-shrink-0 ml-4 self-center">
                        <img src="${ho.image_url}" class="w-16 h-16 sm:w-20 sm:h-20 object-cover rounded-lg border shadow-sm cursor-pointer hover:opacity-90 transition" onclick="openImageModal('${ho.image_url}')">
                    </div>` : '';
                    
                let dateStr = ho.created_at ? ho.created_at.substring(0,16).replace('T',' ') : '';
                let cardDomId = `card_id_${ho.id}`;

                container.innerHTML += `
                    <div id="${cardDomId}" class="p-4 rounded-xl border ${bg} flex row justify-between shadow-sm relative pt-8 handover-card" data-priority="${ho.priority}">
                        
                        <div class="absolute top-1.5 left-2 flex items-center gap-1">
                            <span class="px-1.5 py-0.5 rounded text-white font-bold text-[10px] ${badge}">${ho.priority}</span>
                            <button data-html2canvas-ignore="true" onclick="deleteHandover('${ho.id}')" class="text-gray-400 hover:text-red-500 font-bold text-xs bg-gray-100 hover:bg-gray-200 px-1.5 py-0.2 rounded border shadow-sm transition">
                                結案 ✕
                            </button>
                        </div>

                        <div class="absolute top-1.5 right-2" data-html2canvas-ignore="true">
                            <button onclick="shareCardAsImage('${cardDomId}', '${ho.priority}')" class="text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 font-bold text-xs px-2 py-0.5 rounded border shadow-sm transition flex items-center gap-0.5">
                                📤 分享交接
                            </button>
                        </div>

                        <div class="min-w-0 flex-1 flex flex-col space-y-2 mt-1">
                            <div class="flex flex-wrap items-center text-[11px] text-gray-400 gap-x-2 border-b border-dashed pb-1">
                                <span class="font-bold text-slate-600">發布人員:${ho.creator}</span>
                                <span>➔</span>
                                <span class="font-bold text-indigo-600">接收指名:${ho.assignee}</span>
                                <span class="font-mono ml-auto">${dateStr}</span>
                            </div>
                            <p class="text-slate-800 text-base font-bold whitespace-pre-wrap break-words leading-relaxed tracking-wide">${ho.content}</p>
                        </div>
                        
                        ${imgHtml}
                    </div>`;
            });
        }

        async function submitHandover(btn) {
            const priority = document.getElementById('hoPriority').value;
            const creator = document.getElementById('hoCreator').value;
            const assignee = document.getElementById('hoAssignee').value;
            const content = document.getElementById('hoContent').value.trim();

            if(!creator) return alert("請選擇您的姓名（發布人）");
            if(!assignee) return alert("請選擇接收人");
            if(!content) return alert("請輸入交接內容");

            btn.disabled = true; btn.innerText = "傳送中...";
            let ts = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString();

            try {
                let { error } = await sbClient.from('handovers').insert([{
                    content: content, priority: priority, creator: creator, assignee: assignee, image_url: hoImageBase64, created_at: ts
                }]);
                if (error) throw error;

                fetch(GAS_LINE_API, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "sendNotification", creator: creator, assignee: assignee, priority: priority, content: content
                    })
                });

                closeModal('handoverModal');
                loadMainData();
            } catch(e) {
                alert("發布失敗：" + e.message);
            } finally {
                btn.disabled = false; btn.innerText = "發布並 LINE 推播";
            }
        }

        function shareCardAsImage(cardDomId, priority) {
            const targetCard = document.getElementById(cardDomId);
            if (!targetCard) return;

            html2canvas(targetCard, {
                scale: 2,          
                useCORS: true,      
                backgroundColor: null 
            }).then(canvas => {
                canvas.toBlob(blob => {
                    if (!blob) return alert("圖像轉換失敗！");
                    
                    const imageFile = new File([blob], `仕罡印刷_工作交接單_${priority}.png`, { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [imageFile] })) {
                        navigator.share({
                            files: [imageFile],
                            title: `仕罡印刷 - 工作交接單 [${priority}]`
                        })
                        .then(() => console.log('真實卡片圖片分享成功！'))
                        .catch(err => console.log('分享取消或中斷：', err));
                    } else {
                        alert("您的手機瀏覽器環境不支援直接原生分享圖片檔案，建議使用 Safari 或內建瀏覽器開啟。");
                    }
                }, 'image/png');
            });
        }

        async function deleteHandover(id) {
            if(!confirm("確定要刪除/結案這筆交接事項嗎？")) return;
            await sbClient.from('handovers').delete().eq('id', id);
            loadMainData();
        }

        function filterPriority(prio) {
            document.getElementById('searchInput').value = ''; 
            document.querySelectorAll('.handover-card').forEach(card => {
                if (prio === 'all') { card.style.display = ""; } 
                else { card.style.display = card.getAttribute('data-priority') === prio ? "" : "none"; }
            });
        }

        function toggleDateSort() {
            currentSortOrder = (currentSortOrder === 'desc') ? 'asc' : 'desc';
            document.getElementById('sortBtn').innerText = currentSortOrder === 'desc' ? "⏳ 日期排序 (新➔舊)" : "⌛ 日期排序 (舊➔新)";
            loadMainData();
        }

        function filterHandovers() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.handover-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? "" : "none";
            });
        }

        function handleImageUpload(el) {
            if(!el.files[0]) return;
            compressImage(el.files[0], 400, 400, 0.4, function(base64) {
                hoImageBase64 = base64;
                document.getElementById('hoImagePreview').src = base64;
                document.getElementById('hoImagePreview').classList.remove('hidden');
            });
        }

        function compressImage(file, maxWidth, maxHeight, quality, callback) {
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                    else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                    canvas.width = width; canvas.height = height;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function openHandoverModal() {
            document.getElementById('hoContent').value = ''; document.getElementById('hoCreator').value = '';
            document.getElementById('hoAssignee').value = '全員'; document.getElementById('hoImage').value = '';
            document.getElementById('hoImagePreview').classList.add('hidden'); hoImageBase64 = "";
            document.getElementById('handoverModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openImageModal(src) { document.getElementById('largeImageTarget').src = src; document.getElementById('viewImageModal').classList.remove('hidden'); }
    </script>
</body>
</html>
