<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仕罡印刷-獨立工作交接看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { color: #3A4449; background-color: #F0F1F0; -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F0F1F0; }
        ::-webkit-scrollbar-thumb { background: #8D9B9F; border-radius: 10px; }
        @keyframes pulse-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.96); }
        }
        .animate-pulse-blink { animation: pulse-blink 1.2s infinite ease-in-out; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-[100dvh] flex flex-col items-center">

    <!-- 🔒 首次開啟身分驗證鎖定牆 -->
    <div id="authLockScreen" class="fixed inset-0 bg-slate-900 bg-opacity-95 z-[99] flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-200 text-center">
            <h2 class="text-xl font-bold text-gray-800 tracking-wider mb-1">仕罡印刷工作交接系統</h2>
            <p class="text-xs text-gray-400 mb-6">請先驗證您的員工身分密碼</p>
            <div class="space-y-4 text-left text-xs">
                <div>
                    <label class="block text-gray-600 font-bold mb-1">選擇您的姓名</label>
                    <select id="authEmpName" class="w-full p-2.5 border rounded-lg text-sm bg-white focus:outline-none focus:ring-1 focus:ring-slate-500">
                        <option value="">請點擊選擇...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">通行密碼</label>
                    <input type="password" id="authPassword" placeholder="請輸入密碼" class="w-full p-2.5 border rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-slate-500" onkeypress="if(event.key==='Enter') verifySystemAccess()">
                </div>
                <button onclick="verifySystemAccess()" id="authBtn" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-2.5 rounded-lg text-sm tracking-widest shadow transition-all">
                    驗證身分並登入
                </button>
                <p id="authError" class="text-red-500 font-bold text-center mt-2 hidden tracking-wide">❌ 密碼輸入錯誤，請重新確認！</p>
            </div>
        </div>
    </div>

    <!-- 看板主介面 -->
    <div class="w-full max-w-2xl bg-white border border-gray-300 rounded-xl shadow-md p-4 md:p-6">
        <!-- 標頭區 -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-5 border-b pb-4">
            <div>
                <h1 class="text-xl font-bold text-gray-800 border-l-4 border-slate-600 pl-2 tracking-wider">仕罡印刷事業 - 工作交接看板</h1>
                <p class="text-xs text-gray-400 mt-1">交接需確實完整，避免遺漏造成作業中斷，安全第一。</p>
            </div>
            <button onclick="openHandoverModal()" class="w-full sm:w-auto bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow transition-all">
                ＋ 新增發布交接
            </button>
        </div>

        <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center gap-1.5">
                <button onclick="filterPriority('all')" class="px-2.5 py-1 bg-slate-600 text-white text-xs font-bold rounded shadow-sm hover:bg-slate-700 transition">全部</button>
                <button onclick="filterPriority('高')" class="px-2.5 py-1 bg-red-100 text-red-700 border border-red-200 text-xs font-bold rounded shadow-sm hover:bg-red-200 transition">🔴 高</button>
                <button onclick="filterPriority('中')" class="px-2.5 py-1 bg-yellow-100 text-yellow-800 border border-yellow-200 text-xs font-bold rounded shadow-sm hover:bg-yellow-200 transition">🟡 中</button>
                <button onclick="filterPriority('低')" class="px-2.5 py-1 bg-green-100 text-green-700 border border-green-200 text-xs font-bold rounded shadow-sm hover:bg-green-200 transition">🟢 低</button>
            </div>
            <button onclick="toggleDateSort()" id="sortBtn" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 border text-gray-700 text-xs font-bold rounded shadow-sm transition">
                ⏳ 日期排序 (新➔舊)
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="searchInput" onkeyup="filterHandovers()" placeholder="輸入關鍵字篩選交接內容、發布人、接收人..." class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-slate-500">
        </div>

        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-12">
            <div class="w-10 h-10 border-4 border-gray-200 border-t-slate-600 rounded-full animate-spin mb-3"></div>
            <span class="text-xs font-bold tracking-widest text-gray-400">資料同步中...</span>
        </div>

        <div id="handoverList" class="space-y-3 hidden"></div>
    </div>

    <!-- 彈窗：新增交接 -->
    <div id="handoverModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 hidden flex items-center justify-center p-2 sm:p-4">
        <div class="bg-white rounded-xl w-full max-w-md border shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl flex-shrink-0">
                <h3 class="font-bold text-gray-800 tracking-wider">✍️ 新增工作交接</h3>
                <button onclick="closeModal('handoverModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
            </div>
            
            <div class="p-4 space-y-4 overflow-y-auto text-xs flex-1 min-h-0 h-full scrollbar-thin">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">優先級別</label>
                        <select id="hoPriority" class="w-full p-2.5 border rounded-lg text-sm bg-white">
                            <option value="高">高 (紅色警示)</option>
                            <option value="中" selected>中 (黃色提醒)</option>
                            <option value="低">低 (綠色常態)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">交接發布人 (已鎖定)</label>
                        <input type="text" id="hoCreator" readonly class="w-full p-2.5 border rounded-lg text-sm bg-gray-100 text-gray-500 font-bold cursor-not-allowed">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">指定接收人 (自動連動 LINE 專向推播)</label>
                    <select id="hoAssignee" class="w-full p-2.5 border rounded-lg text-sm bg-white"></select>
                </div>
                
                <!-- 指定時間 / 追蹤工作 滑動切換開關 -->
                <div class="flex items-center justify-between bg-slate-100 p-3 rounded-xl border border-gray-200">
                    <span id="toggleStatusLabel" class="text-sm font-bold text-indigo-700 tracking-wide">📅 當前模式：指定時間</span>
                    <label class="relative inline-flex items-center cursor-pointer select-none">
                        <input type="checkbox" id="hoModeToggle" onchange="handleModeToggleChange()" class="sr-only peer">
                        <div class="w-14 h-7 bg-indigo-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-6 after:transition-all peer-checked:bg-slate-500"></div>
                    </label>
                </div>

                <!-- 指定時間之日期選單區塊 -->
                <div id="dateTimeFieldsBlock" class="flex flex-row gap-3 bg-slate-50 p-3 rounded-lg border border-gray-200 w-full box-border">
                    <div class="w-1/2">
                        <label class="block text-gray-700 font-bold mb-1 truncate">📅 指定處理日期</label>
                        <select id="hoTargetDate" class="w-full p-2.5 border rounded-lg text-sm bg-white focus:outline-none"></select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-gray-700 font-bold mb-1 truncate">⏱️ 指定處理時間</label>
                        <select id="hoTargetTime" class="w-full p-2.5 border rounded-lg text-sm bg-white focus:outline-none"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-600 font-bold mb-1">交接具體內容</label>
                    <textarea id="hoContent" rows="3" placeholder="請詳細敘述交接交代事項..." class="w-full p-2.5 border rounded-lg text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-1">現場附加照片</label>
                    <input type="file" id="hoImage" accept="image/*" onchange="handleImageUpload(this)" class="w-full text-xs text-gray-500 cursor-pointer">
                    <div class="mt-2 flex justify-center bg-gray-50 rounded-lg border border-dashed p-1">
                        <img id="hoImagePreview" class="hidden max-h-24 object-contain p-1 rounded-lg" src="">
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t flex justify-end gap-3 bg-gray-50 rounded-b-xl flex-shrink-0">
                <button onclick="closeModal('handoverModal')" class="px-4 py-2 border hover:bg-gray-100 rounded-lg text-sm">取消</button>
                <button id="submitBtn" onclick="submitHandover(this)" class="px-5 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-lg text-sm font-bold shadow">發布並 LINE 推播</button>
            </div>
        </div>
    </div>

    <!-- 彈窗：大圖 -->
    <div id="viewImageModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex items-center justify-center p-4" onclick="closeModal('viewImageModal')">
        <div class="relative max-w-4xl max-h-[90vh] bg-white p-1 rounded-xl shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('viewImageModal')" class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold shadow-md z-10">&times;</button>
            <img id="largeImageTarget" class="max-w-full max-h-[85vh] object-contain rounded-lg" src="">
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tfgtvtceiozvnujiiiqj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MIbXBy5UrRMMDwcYIaaQbA_1YWEleuK";
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const GAS_LINE_API = "https://script.google.com/macros/s/AKfycbwBImtScXqfsZ5q-ik5cqjgGvAGq3yNecD3_QvKBOw70OSoIsETlSuYWYi1aiDoeHhG/exec"; 

        let hoImageBase64 = ""; 
        let currentHandovers = [];
        let userListCache = [];
        let currentSortOrder = 'desc'; 
        let loggedInUser = ""; 
        let tempCommentImageBase64 = ""; 

        window.onload = async () => {
            await checkAuthenticationState();
            buildTargetTimeOptions(); 
        };

        async function checkAuthenticationState() {
            userListCache = await fetchUsersFromSupabase();
            const cachedUser = localStorage.getItem("sg_handover_user");
            if (cachedUser && userListCache.includes(cachedUser)) {
                loggedInUser = cachedUser;
                buildAssigneeDropdown();
                loadMainData();
            } else {
                buildAuthDropdown();
                document.getElementById('authLockScreen').classList.remove('hidden');
            }
        }

        function buildAuthDropdown() {
            let opts = '<option value="">請點擊選擇您的姓名...</option>';
            userListCache.forEach(name => opts += `<option value="${name}">${name}</option>`);
            document.getElementById('authEmpName').innerHTML = opts;
        }

        function buildAssigneeDropdown() {
            let assigneeOpts = '<option value="全員">全員 (群體廣播)</option>';
            userListCache.forEach(name => assigneeOpts += `<option value="${name}">${name}</option>`);
            document.getElementById('hoAssignee').innerHTML = assigneeOpts;
        }

        function buildTargetTimeOptions() {
            const dateSelect = document.getElementById('hoTargetDate');
            let dateOpts = '';
            let dayLabels = ['(日)','(一)','(二)','(三)','(四)','(五)','(六)'];
            
            for (let i = 0; i < 7; i++) {
                let d = new Date();
                d.setDate(d.getDate() + i);
                let yyyy = d.getFullYear();
                let mm = String(d.getMonth() + 1).padStart(2, '0');
                let dd = String(d.getDate()).padStart(2, '0');
                let dayName = i === 0 ? "今天" : (i === 1 ? "明天" : dayLabels[d.getDay()]);
                
                let val = `${yyyy}-${mm}-${dd}`;
                let text = `${yyyy}年${mm}月${dd}日 ${dayName}`;
                dateOpts += `<option value="${val}">${text}</option>`;
            }
            dateSelect.innerHTML = dateOpts;

            const timeSelect = document.getElementById('hoTargetTime');
            let timeOpts = '';
            for (let hour = 6; hour <= 22; hour++) {
                for (let min = 0; min < 60; min += 10) {
                    if (hour === 22 && min > 0) break; 
                    let hh = String(hour).padStart(2, '0');
                    let mm = String(min).padStart(2, '0');
                    timeOpts += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
                }
            }
            timeSelect.innerHTML = timeOpts;

            let now = new Date();
            now.setMinutes(now.getMinutes() + 30);
            let m = now.getMinutes();
            let roundedMin = Math.round(m / 10) * 10;
            if (roundedMin === 60) { now.setHours(now.getHours() + 1); roundedMin = 0; }
            
            let defH = now.getHours();
            if (defH < 6) defH = 6;
            if (defH > 22) { defH = 22; roundedMin = 0; }
            
            timeSelect.value = String(defH).padStart(2, '0') + ":" + String(roundedMin).padStart(2, '0');
        }

        function handleModeToggleChange() {
            const isChecked = document.getElementById('hoModeToggle').checked;
            const label = document.getElementById('toggleStatusLabel');
            const timeBlock = document.getElementById('dateTimeFieldsBlock');
            
            if (isChecked) {
                label.innerText = "📌 當前模式：追蹤工作";
                label.className = "text-sm font-bold text-slate-600 tracking-wide";
                timeBlock.classList.add('hidden');
            } else {
                label.innerText = "📅 當前模式：指定時間";
                label.className = "text-sm font-bold text-indigo-700 tracking-wide";
                timeBlock.classList.remove('hidden');
            }
        }

        async function verifySystemAccess() {
            const empName = document.getElementById('authEmpName').value;
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('authBtn');
            const err = document.getElementById('authError');

            if (!empName) return alert("請選擇您的姓名");
            if (!password) return alert("請輸入驗證密碼");

            btn.disabled = true; btn.innerText = "驗證中...";
            err.classList.add('hidden');

            try {
                let { data, error } = await sbClient.from('users_auth').select('password').eq('emp_name', empName);
                if (error) throw error;

                if (data && data.length > 0 && String(data[0].password) === String(password)) {
                    localStorage.setItem("sg_handover_user", empName);
                    loggedInUser = empName;
                    document.getElementById('authLockScreen').classList.add('hidden');
                    buildAssigneeDropdown();
                    loadMainData();
                } else {
                    err.classList.remove('hidden');
                }
            } catch(e) {
                alert("連線失敗：" + e.message);
            } finally {
                btn.disabled = false; btn.innerText = "驗證身分並登入";
            }
        }

        async function fetchUsersFromSupabase() {
            let { data, error } = await sbClient.from('users_auth').select('emp_name, is_visible');
            if (error) return [];
            return (data || []).filter(u => u.is_visible !== '否').map(u => u.emp_name);
        }

        async function fetchHandoversFromSupabase() {
             let { data, error } = await sbClient.from('handovers')
                .select('*')
                .or('status.is.null,status.neq.已結案')
                .order('created_at', { ascending: (currentSortOrder === 'asc') });
             if (error) return [];
             return data || [];
        }

        async function loadMainData() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('handoverList').classList.add('hidden');
            currentHandovers = await fetchHandoversFromSupabase();
            renderHandovers(currentHandovers);
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('handoverList').classList.remove('hidden');
        }

        function renderHandovers(list) {
            const container = document.getElementById('handoverList');
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-12 bg-gray-50 border border-dashed rounded-xl">目前沒有待辦交接事項</p>`;
                return;
            }
            
            const nowTime = new Date().getTime();

            list.forEach(ho => {
                let bg = 'bg-white border-gray-200'; let badge = 'bg-green-500';
                
                let topHeaderBg = 'bg-slate-50'; 
                if(ho.priority === '高') { 
                    bg = 'bg-red-50/20 border-red-200'; 
                    badge = 'bg-red-500'; 
                    topHeaderBg = 'bg-red-100/40'; 
                }
                else if(ho.priority === '中') { 
                    bg = 'bg-yellow-50/20 border-yellow-200'; 
                    badge = 'bg-yellow-500'; 
                    topHeaderBg = 'bg-yellow-100/40'; 
                }
                else if(ho.priority === '低') {
                    topHeaderBg = 'bg-green-100/30'; 
                }

                let imgHtml = ho.image_url ? `
                    <div class="flex-shrink-0 ml-4 self-center">
                        <img src="${ho.image_url}" class="w-16 h-16 sm:w-20 sm:h-20 object-cover rounded-lg border shadow-sm cursor-pointer hover:opacity-90 transition" onclick="openImageModal('${ho.image_url}')">
                    </div>` : '';
                    
                let dateStr = ho.created_at ? ho.created_at.substring(0,16).replace('T',' ') : '';
                let outerCardDomId = `outer_card_${ho.id}`;

                let expiryAlertHtml = '';
                if (ho.content.includes("預計處理時間：")) {
                    try {
                        let match = ho.content.match(/預計處理時間：([0-8\-]+ \d\d:\d\d)/);
                        if (match && match[1]) {
                            let targetTimestamp = new Date(match[1].replace(/-/g, '/')).getTime();
                            if (nowTime > targetTimestamp) {
                                expiryAlertHtml = `<span class="px-2 py-0.5 ml-1 bg-red-600 text-white rounded text-[10px] font-extrabold animate-pulse-blink shadow-sm">⚠️ 處理時間已過期！</span>`;
                            }
                        }
                    } catch(e){}
                }

                let deleteBtnHtml = (loggedInUser === ho.creator || loggedInUser === ho.assignee || ho.assignee === "全員") ? `
                    <button data-html2canvas-ignore="true" onclick="archiveHandover('${ho.id}')" class="text-red-600 hover:bg-red-100 font-bold text-[10px] bg-white px-1.5 py-0.5 rounded border shadow-sm transition ml-1">
                        安全結案 ✓
                    </button>` : '';

                let cleanContent = ho.content;
                if (cleanContent.includes("📅點擊加入行事曆：")) {
                    cleanContent = cleanContent.split("📅點擊加入行事曆：")[0].trim();
                }

                let stateHeaderHtml = '';
                if (cleanContent.includes("⏰【預計處理時間：")) {
                    let match = cleanContent.match(/(⏰【預計處理時間：[^\]]+】)/);
                    if (match && match[1]) {
                        stateHeaderHtml = `<span class="text-[10px] font-medium text-slate-400 block mb-0.5 tracking-wide">${match[1]}</span>`;
                        cleanContent = cleanContent.replace(/⏰【預計處理時間：[^\]]+】\n-+\n/, '').trim();
                    }
                } else if (cleanContent.includes("📌【追蹤工作單：")) {
                    let match = cleanContent.match(/(📌【追蹤工作單：[^\]]+】)/);
                    if (match && match[1]) {
                        stateHeaderHtml = `<span class="text-[10px] font-medium text-slate-400 block mb-0.5 tracking-wide">${match[1]}</span>`;
                        cleanContent = cleanContent.replace(/📌【追蹤工作單：[^\]]+】\n-+\n/, '').trim();
                    }
                }

                // 💡 修正 1：將 outerCardDomId 設定在最外層的包裹 div 上，以確保 html2canvas 截圖時可以抓到整個包含討論串的完整內容
                container.innerHTML += `
                    <div id="${outerCardDomId}" class="bg-white border rounded-xl shadow-sm overflow-hidden handover-card" data-priority="${ho.priority}" data-creator="${ho.creator}" data-assignee="${ho.assignee}">
                        
                        <div class="flex row relative pt-10 pb-4 px-4">
                            
                            <div class="flex-shrink-0 flex items-center pr-2" data-html2canvas-ignore="true">
                                <button onclick="toggleCommentThread('${ho.id}')" id="arrow_icon_${ho.id}" class="text-slate-400 hover:text-slate-700 font-bold text-base px-1.5 py-3 bg-slate-50 border rounded-lg transition">▶</button>
                            </div>

                            <div class="absolute top-0 left-0 right-0 ${topHeaderBg} border-b border-gray-200/60 px-3 py-1 flex items-center justify-between">
                                <div class="flex items-center gap-1">
                                    <span class="px-1.5 py-0.5 rounded text-white font-bold text-[9px] ${badge}">${ho.priority}</span>
                                    ${expiryAlertHtml}
                                    ${deleteBtnHtml}
                                </div>
                                <div class="flex items-center gap-1" data-html2canvas-ignore="true">
                                    <!-- 💡 修正 2：分享按鈕傳入 outerCardDomId -->
                                    <button onclick="shareCardAsImage('${outerCardDomId}', '${ho.priority}')" class="text-slate-600 hover:text-slate-900 bg-white/80 font-bold text-[10px] px-1.5 py-0.5 rounded border shadow-xs transition">
                                        📤 分享交接
                                    </button>
                                </div>
                            </div>

                            <div class="min-w-0 flex-1 flex flex-col space-y-1.5 mt-1">
                                <div class="border-b border-dashed pb-1">
                                    ${stateHeaderHtml}
                                    <div class="flex flex-wrap items-center text-[11px] text-gray-400 gap-x-2">
                                        <span class="font-bold text-slate-600">發布人員:${ho.creator}</span>
                                        <span>➔</span>
                                        <span class="font-bold text-indigo-600">接收指名:${ho.assignee}</span>
                                        <span class="font-mono ml-auto">${dateStr}</span>
                                    </div>
                                </div>
                                <p class="text-slate-800 text-base font-bold whitespace-pre-wrap break-words leading-relaxed tracking-wide">${cleanContent}</p>
                            </div>
                            
                            ${imgHtml}
                        </div>

                        <div id="thread_panel_${ho.id}" class="hidden border-t bg-slate-50/70 p-3 space-y-3" data-html2canvas-ignore="true">
                            <div class="border-b pb-1 flex justify-between items-center">
                                <span class="text-[11px] font-bold text-slate-500 tracking-wider">💬 延伸交接討論串</span>
                            </div>

                            <div class="space-y-2.5 max-h-60 overflow-y-auto pr-1" id="thread_list_${ho.id}"></div>

                            <div class="bg-white p-2.5 rounded-lg border space-y-2">
                                <textarea id="comment_input_${ho.id}" rows="2" placeholder="請輸入延伸補充內容..." class="w-full p-2 border rounded-md text-xs focus:outline-none focus:ring-1 focus:ring-slate-400"></textarea>
                                <div class="flex items-center justify-between gap-2">
                                    <div class="flex items-center gap-1.5">
                                        <input type="file" id="comment_file_${ho.id}" accept="image/*" onchange="handleCommentImageUpload(this, '${ho.id}')" class="hidden">
                                        <button onclick="document.getElementById('comment_file_${ho.id}').click()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded font-bold text-[11px] border">📷 附圖</button>
                                        <span id="comment_file_indicator_${ho.id}" class="text-[10px] text-green-600 font-bold hidden">已選圖片</span>
                                    </div>
                                    <button onclick="submitComment('${ho.id}')" class="bg-slate-700 hover:bg-slate-800 text-white font-bold px-3 py-1 rounded text-[11px] shadow">送出補充</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function toggleCommentThread(handoverId) {
            const panel = document.getElementById(`thread_panel_${handoverId}`);
            const icon = document.getElementById(`arrow_icon_${handoverId}`);
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                icon.innerText = "▼";
                await loadComments(handoverId);
            } else {
                panel.classList.add('hidden');
                icon.innerText = "▶";
            }
        }

        async function loadComments(handoverId) {
            const listContainer = document.getElementById(`thread_list_${handoverId}`);
            listContainer.innerHTML = '<p class="text-[11px] text-gray-400 text-center py-2">載入中...</p>';
            
            let { data, error } = await sbClient.from('handover_comments').select('*').eq('handover_id', handoverId).order('created_at', { ascending: true });
            if (error || !data || data.length === 0) {
                listContainer.innerHTML = '<p class="text-[11px] text-gray-400 text-center py-2">目前尚無延伸討論內容</p>';
                return;
            }

            let html = '';
            data.forEach(c => {
                let timeText = c.created_at ? c.created_at.substring(5,16).replace('T',' ') : '';
                if (c.updated_at) {
                    timeText += ` (於 ${c.updated_at.substring(5,16).replace('T',' ')} 編輯)`;
                }
                let imgHtml = c.image_url ? `<img src="${c.image_url}" class="mt-1.5 max-h-24 object-contain rounded border shadow-sm cursor-pointer" onclick="openImageModal('${c.image_url}')">` : '';

                html += `
                    <div class="bg-white p-2 rounded-lg border shadow-xs text-xs space-y-1">
                        <div class="flex justify-between items-center text-[10px] text-gray-400 border-b border-dashed pb-0.5 mb-1">
                            <span class="font-bold text-slate-600">👤 ${c.creator}</span>
                            <span>${timeText}</span>
                        </div>
                        <p id="comment_text_${c.id}" class="text-slate-700 font-medium whitespace-pre-wrap break-words leading-relaxed">${c.content}</p>
                        ${imgHtml}
                        <div class="text-right pt-1">
                            <button onclick="openEditCommentField('${c.id}', '${handoverId}')" class="text-[10px] font-bold text-indigo-500 hover:underline">✏️ 編輯內容</button>
                        </div>
                    </div>`;
            });
            listContainer.innerHTML = html;
            listContainer.scrollTop = listContainer.scrollHeight;
        }

        async function submitComment(handoverId) {
            const textarea = document.getElementById(`comment_input_${handoverId}`);
            const content = textarea.value.trim();
            if (!content) return alert("請輸入補充內容");

            let ts = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString();
            
            let { error } = await sbClient.from('handover_comments').insert([{
                handover_id: handoverId, content: content, creator: loggedInUser, image_url: tempCommentImageBase64, created_at: ts
            }]);

            if (error) {
                alert("發布失敗：" + error.message);
            } else {
                textarea.value = '';
                tempCommentImageBase64 = "";
                document.getElementById(`comment_file_indicator_${handoverId}`).classList.add('hidden');
                await loadComments(handoverId);
            }
        }

        function openEditCommentField(commentId, handoverId) {
            const p = document.getElementById(`comment_text_${commentId}`);
            const originalText = p.innerText;
            p.innerHTML = `
                <textarea id="edit_input_${commentId}" class="w-full p-1 border rounded text-xs leading-relaxed whitespace-pre-wrap" rows="2">${originalText}</textarea>
                <div class="flex justify-end gap-1.5 mt-1">
                    <button onclick="loadComments('${handoverId}')" class="px-1.5 py-0.5 bg-gray-100 border text-[10px] rounded">取消</button>
                    <button onclick="saveEditedComment('${commentId}', '${handoverId}')" class="px-1.5 py-0.5 bg-indigo-600 text-white text-[10px] font-bold rounded shadow">儲存</button>
                </div>`;
        }

        async function saveEditedComment(commentId, handoverId) {
            const newContent = document.getElementById('edit_input_' + commentId).value.trim();
            if (!newContent) return alert("內容不能為空");

            let ts = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString();

            let { error } = await sbClient.from('handover_comments').update({ content: newContent, updated_at: ts }).eq('id', commentId);
            if (error) alert("更新失敗");
            await loadComments(handoverId);
        }

        async function archiveHandover(id) {
            if(!confirm("確定要將這筆工作交接單結案嗎？\n(結案後看板將不再顯示，但資料會完整留存備查)")) return;
            let { error } = await sbClient.from('handovers').update({ status: '已結案' }).eq('id', id);
            if (error) alert("結案失敗：" + error.message);
            loadMainData();
        }

        function handleCommentImageUpload(el, handoverId) {
            if(!el.files[0]) return;
            compressImage(el.files[0], 400, 400, 0.4, function(base64) {
                tempCommentImageBase64 = base64;
                document.getElementById(`comment_file_indicator_${handoverId}`).classList.remove('hidden');
            });
        }

        async function submitHandover(btn) {
            const priority = document.getElementById('hoPriority').value;
            const creator = document.getElementById('hoCreator').value;
            const assignee = document.getElementById('hoAssignee').value;
            let content = document.getElementById('hoContent').value.trim();
            const isTrackingMode = document.getElementById('hoModeToggle').checked; 

            if(!creator) return alert("系統未能順利獲取您的發布身分，請嘗試重新整理網頁");
            if(!assignee) return alert("請選擇接收人");
            if(!content) return alert("請輸入交接內容");

            let dbContent = "";
            let lineContent = "";

            if (!isTrackingMode) {
                const targetDate = document.getElementById('hoTargetDate').value;
                const targetTime = document.getElementById('hoTargetTime').value;
                const displayTime = `${targetDate} ${targetTime}`;
                const gCalDate = displayTime.replace(/[- :]/g, '').substring(0, 12) + "00"; 
                const gCalLink = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('仕罡印刷-交接待辦項目')}&dates=${gCalDate}/${gCalDate}&details=${encodeURIComponent(content)}`;
                
                dbContent = `⏰【預計處理時間：${displayTime}】\n-------------------------\n${content}`;
                lineContent = `${dbContent}\n\n📅點擊加入行事曆：${gCalLink}`;
            } else {
                dbContent = `📌【追蹤工作單：未結案前持續掛載】\n-------------------------\n${content}`;
                lineContent = dbContent;
            }

            btn.disabled = true; btn.innerText = "傳送中...";
            let ts = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString();

            try {
                let { error } = await sbClient.from('handovers').insert([{
                    content: dbContent, priority: priority, creator: creator, assignee: assignee, image_url: hoImageBase64, created_at: ts, status: '進行中'
                }]);
                if (error) throw error;

                if (assignee === "全員") {
                    userListCache.forEach(targetEmployee => {
                        fetch(GAS_LINE_API, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                action: "sendNotification", creator: creator, assignee: targetEmployee, priority: priority, content: lineContent
                            })
                        });
                    });
                } else {
                    fetch(GAS_LINE_API, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            action: "sendNotification", creator: creator, assignee: assignee, priority: priority, content: lineContent
                        })
                    });
                }

                closeModal('handoverModal');
                loadMainData();
            } catch(e) {
                alert("發布失敗：" + e.message);
            } finally {
                btn.disabled = false; btn.innerText = "發布並 LINE 推播";
            }
        }

        // 💡 修正 3：讓 html2canvas 的指定節點暫時移除限制，截圖時若討論串區塊為展開狀態，將一併完美渲染成大張圖檔
        function shareCardAsImage(outerCardDomId, priority) {
            const targetCard = document.getElementById(outerCardDomId);
            if (!targetCard) return;

            // 取得該卡片內部的討論串面板，暫時在截圖期間放行 RLS 顯示
            const threadPanel = targetCard.querySelector('[id^="thread_panel_"]');
            let originalIgnoreAttr = null;
            if (threadPanel && !threadPanel.classList.contains('hidden')) {
                // 如果討論串目前是展開狀態，暫時移除 html2canvas-ignore 以便納入截圖
                threadPanel.removeAttribute('data-html2canvas-ignore');
                originalIgnoreAttr = true;
            }

            html2canvas(targetCard, {
                scale: 2,          
                useCORS: true,      
                backgroundColor: "#FFFFFF" // 固定底色以利延伸區呈現
            }).then(canvas => {
                // 還原屬性標記維持原架構
                if (originalIgnoreAttr && threadPanel) {
                    threadPanel.setAttribute('data-html2canvas-ignore', 'true');
                }

                canvas.toBlob(blob => {
                    if (!blob) return alert("圖像轉換失敗！");
                    const imageFile = new File([blob], `仕罡印刷_工作交接單_${priority}.png`, { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [imageFile] })) {
                        navigator.share({ files: [imageFile], title: `仕罡印刷 - 工作交接單 [${priority}]` })
                        .then(() => console.log('真實卡片圖片分享成功！'))
                        .catch(err => console.log('分享取消或中斷：', err));
                    } else {
                        alert("您的手機瀏覽器環境不支援直接原生分享圖片檔案，建議使用 Safari 或內建瀏覽器開啟。");
                    }
                }, 'image/png');
            });
        }

        async function deleteHandover(id) {
            if(!confirm("確定要徹底物理刪除這筆交接事項嗎？")) return;
            await sbClient.from('handovers').delete().eq('id', id);
            loadMainData();
        }

        function filterPriority(prio) {
            document.getElementById('searchInput').value = ''; 
            document.querySelectorAll('.handover-card').forEach(card => {
                if (prio === 'all') { card.style.display = ""; } 
                else { card.style.display = card.getAttribute('data-priority') === prio ? "" : "none"; }
            });
        }

        function toggleDateSort() {
            currentSortOrder = (currentSortOrder === 'desc') ? 'asc' : 'desc';
            document.getElementById('sortBtn').innerText = currentSortOrder === 'desc' ? "⏳ 日期排序 (新➔舊)" : "⌛ 日期排序 (舊➔新)";
            
            currentHandovers.sort((a, b) => {
                let timeA = new Date(a.created_at).getTime();
                let timeB = new Date(b.created_at).getTime();
                return currentSortOrder === 'desc' ? timeB - timeA : timeA - timeB;
            });
            renderHandovers(currentHandovers);
        }

        function filterHandovers() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.handover-card').forEach(card => {
                const textPool = card.innerText.toLowerCase() + " " + 
                                 card.getAttribute('data-creator').toLowerCase() + " " + 
                                 card.getAttribute('data-assignee').toLowerCase();
                card.style.display = textPool.includes(q) ? "" : "none";
            });
        }

        handleImageUpload = (el) => {
            if(!el.files[0]) return;
            compressImage(el.files[0], 400, 400, 0.4, function(base64) {
                hoImageBase64 = base64;
                document.getElementById('hoImagePreview').src = base64;
                document.getElementById('hoImagePreview').classList.remove('hidden');
            });
        }

        function compressImage(file, maxWidth, maxHeight, quality, callback) {
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                    else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                    canvas.width = width; canvas.height = height;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function openHandoverModal() {
            document.getElementById('hoContent').value = ''; 
            document.getElementById('hoCreator').value = loggedInUser;
            document.getElementById('hoAssignee').value = '全員'; document.getElementById('hoImage').value = '';
            document.getElementById('hoImagePreview').classList.add('hidden'); hoImageBase64 = "";
            document.getElementById('hoModeToggle').checked = false; 
            handleModeToggleChange();
            buildTargetTimeOptions(); 
            document.getElementById('handoverModal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openImageModal(src) { document.getElementById('largeImageTarget').src = src; document.getElementById('viewImageModal').classList.remove('hidden'); }
    </script>
